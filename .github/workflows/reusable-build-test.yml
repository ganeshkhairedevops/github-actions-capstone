name: Reusable Build & Test

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: true
        type: string
      run_tests:
        description: "Run tests or not"
        required: false
        type: boolean
        default: true
    outputs:
      test_result:
        description: "Result of test execution"
        value: ${{ jobs.build.outputs.result }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      result: ${{ steps.set-result.outputs.result }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Dependencies
        run: npm install

      - name: Start App
        run: |
          npm start &
          sleep 5

      - name: Run Tests (Health Check)
        if: ${{ inputs.run_tests }}
        run: |
          curl -f http://localhost:3000/health || exit 1

      - name: Set Test Result (Passed)
        id: set-result
        if: success()
        run: echo "result=passed" >> $GITHUB_OUTPUT

      - name: Set Test Result (Failed)
        if: failure()
        run: echo "result=failed" >> $GITHUB_OUTPUT