name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name (e.g., username/app)"
        required: true
        type: string
      tag:
        description: "Docker image tag"
        required: true
        type: string
    secrets:
      docker_username:
        required: true
        description: 'Docker Hub username'
      docker_token:
        required: true
        description: 'Docker Hub token'
    outputs:
      image_url:
        description: "Full Docker image URL"
        value: ${{ jobs.docker.outputs.image }}

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.docker_token }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ inputs.image_name }}:${{ inputs.tag }} .
          docker build -t ${{ inputs.image_name }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ inputs.image_name }}:${{ inputs.tag }}
          docker push ${{ inputs.image_name }}:latest

      - name: Set Image Output
        id: set-image
        run: echo "image=${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT